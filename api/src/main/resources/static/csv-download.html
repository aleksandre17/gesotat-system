<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV ექსპორტი</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: transparent;
            padding: 20px;
        }

        .accordion {
            width: 100%;
            max-width: 800px;
        }

        .accordion-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 14px 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .accordion-header:hover {
            background: #fafafa;
        }

        .accordion-header.active {
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            border-bottom: none;
        }

        .accordion-title {
            color: #2e7d32;
            font-size: 15px;
            font-weight: 500;
        }

        .accordion-icon {
            color: #666;
            font-size: 12px;
            transition: transform 0.3s;
        }

        .accordion-header.active .accordion-icon {
            transform: rotate(180deg);
        }

        .accordion-content {
            display: none;
            border: 1px solid #e0e0e0;
            border-top: none;
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
            background: #fff;
        }

        .accordion-content.active {
            display: block;
        }

        .download-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f0f7f0;
            border-bottom: 1px solid #e8f5e9;
            padding: 12px 20px;
        }

        .download-row:last-child {
            border-bottom: none;
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
        }

        .download-text {
            color: #2e7d32;
            font-size: 14px;
            font-weight: 500;
        }

        .download-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            opacity: 0.8;
            transform: scale(1.1);
        }

        .btn-icon img {
            display: block;
        }

        /* Modal/Popup Overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }

        .modal-header h2 {
            font-size: 18px;
            color: #333;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            color: #999;
            cursor: pointer;
            line-height: 1;
            padding: 0;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #333;
        }

        .modal-body {
            height: 500px;
            overflow: hidden;
        }

        .modal-body iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 480px) {
            .modal {
                max-height: 85vh;
            }

            .modal-body {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="accordion">
        <div class="accordion-header" onclick="toggleAccordion()">
            <span class="accordion-title">ბრუნვა</span>
            <span class="accordion-icon">▼</span>
        </div>
        <div class="accordion-content" id="accordion-content">
            <div class="download-row">
                <span class="download-text">მონაცემების გადმოწერა</span>
                <div class="download-buttons">
                    <a href="https://geostat.ge/media/75543/%E1%83%91%E1%83%A0%E1%83%A3%E1%83%9C%E1%83%95%E1%83%90.xlsx" target="_blank" class="btn-icon" title="XLS">
                        <img src="/static/10452269.png" alt="XLS" width="24" height="24">
                    </a>
                    <a href="#" onclick="openDownloadModal(event)" class="btn-icon" title="CSV">
                        <img src="/static/5105246.png" alt="CSV" width="24" height="24">
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Popup -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h2>📥 CSV ფაილების ჩამოტვირთვა</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <iframe id="download-iframe" src="about:blank"></iframe>
            </div>
        </div>
    </div>

    <script>
        const DOWNLOAD_URL = 'https://autoapi.geostat.ge/api/v1/xlsx-to-csv/download-all';

        function toggleAccordion() {
            const header = document.querySelector('.accordion-header');
            const content = document.getElementById('accordion-content');

            header.classList.toggle('active');
            content.classList.toggle('active');
        }

        function openDownloadModal(event) {
            event.preventDefault();
            const modal = document.getElementById('modal');
            const iframe = document.getElementById('download-iframe');

            modal.classList.add('active');
            iframe.src = DOWNLOAD_URL;
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            const iframe = document.getElementById('download-iframe');

            modal.classList.remove('active');
            iframe.src = 'about:blank';
            document.body.style.overflow = '';
        }

    </script>
</body>
</html>
