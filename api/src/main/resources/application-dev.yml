## ─── API: Development Profile ───────────────────────────────
## Activated with: --spring.profiles.active=dev
## Credentials: add api/src/main/resources/application-local.yml (gitignored)

server:
  port: 8081

spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.base.api: DEBUG
    org.base.mobile: DEBUG
    org.springframework.jdbc: DEBUG
    org.hibernate.SQL: DEBUG