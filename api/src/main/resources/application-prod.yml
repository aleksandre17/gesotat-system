## ─── API: Production Profile ────────────────────────────────
## Activated with: SPRING_PROFILES_ACTIVE=prod

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false

logging:
  file:
    path: /app/logs
  level:
    root: WARN
    org.base.api: INFO
    org.base.mobile: INFO
    org.springframework: WARN
    org.hibernate: WARN