server:
  port: 8081

security:
  type: api

spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 1000MB
      max-request-size: 1000MB
      file-size-threshold: 0B
      location: /tmp/uploads

  main:
    allow-bean-definition-overriding: true

  application:
    name: api

  datasource:
    primary:
      jdbc-url: jdbc:sqlserver://192.168.0.230;databaseName=geostat-system;useBulkCopyForBatchInsert=true;encrypt=true;trustServerCertificate=true;serverTimezone=Asia/Tbilisi;cachePrepStmts=true;reWriteBatchedInserts=true
      username: sa
      password: Ozzy112358
      driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

    secondary:
      jdbc-url: jdbc:sqlserver://192.168.0.230;databaseName=auto;encrypt=true;useBulkCopyForBatchInsert=true;trustServerCertificate=true;serverTimezone=Asia/Tbilisi;cachePrepStmts=true;reWriteBatchedInserts=true
      username: sa
      password: Ozzy112358
      driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

    mysql:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://${MYSQL_HOST:192.168.1.29}:${MYSQL_PORT:3306}/${MYSQL_DB:agriculture}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tbilisi
      username: ${MYSQL_USER:fdi}
      password: "${MYSQL_PASS:Asd123$%}"
      hikari:
        pool-name: HikariPool-MySQL
        maximum-pool-size: ${MYSQL_MAX_POOL_SIZE:10}
        minimum-idle: ${MYSQL_MIN_IDLE:2}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          batch_size: 1000
          batch_versioned_data: true
        format_sql: true
        order_updates: true
        order_inserts: true
        # Removed global dialect - will be set per datasource in configuration classes

jwt:
  secret: "5A7C8E1F2A3C5E7A8C1E2F3A5C7E8A1F2C3F5A7C8E1F2A3C5E7A8C1E2F3A5C7E"
  expiration: 86400000
  refresh-expiration: 86400000  # 24 hours in milliseconds

logging:
  level:
    org:
      springframework:
        jdbc: DEBUG

storage:
  export-dir: api/storage/access_exports

