<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title>Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">Application</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="/">Home</a>
        </li>
        <li class="nav-item" sec:authorize="isAuthenticated()">
          <a class="nav-link" href="/dashboard">Dashboard</a>
        </li>
      </ul>
      <div class="navbar-nav" sec:authorize="!isAuthenticated()">
        <a class="nav-link" href="/login">Login</a>
      </div>
      <form sec:authorize="isAuthenticated()" class="form-inline" th:action="@{/logout}" method="post">
        <span class="navbar-text me-2" sec:authentication="name"></span>
        <button class="btn btn-outline-light" type="submit">Logout</button>
      </form>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <div class="jumbotron">
    <h1 class="display-4">Welcome to Application</h1>
    <p class="lead">This is a simple home page. Please login to access the dashboard.</p>
    <hr class="my-4">
    <p sec:authorize="!isAuthenticated()">
      <a class="btn btn-primary btn-lg" href="/login" role="button">Login</a>
    </p>
    <p sec:authorize="isAuthenticated()">
      <a class="btn btn-primary btn-lg" href="/dashboard" role="button">Go to Dashboard</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
